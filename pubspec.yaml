name: laundrify
description: Premium laundry service application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.5
  connectivity_plus: ^5.0.2

  # Payment Gateway
  razorpay_flutter: ^1.3.7

  # Google Sign In
  google_sign_in: ^6.2.2

  # UI & Animations
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0

  # Web interop
  web: ^1.1.0

  # Storage & Preferences
  shared_preferences: ^2.3.3

  # HTTP & API
  http: ^1.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # PDF Generation & Printing
  pdf: ^3.11.1
  printing: ^5.13.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

  # URL Launcher
  url_launcher: ^6.3.1

  # Video Player
  video_player: ^2.9.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/items/
    - assets/lottie/
    - assets/sounds/
    - assets/icon/
